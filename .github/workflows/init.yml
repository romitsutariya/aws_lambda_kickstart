name: Create Lambda (Manual)

on:
  workflow_dispatch:
    inputs:
      function_name:
        description: "Lambda function name"
        required: true
        default: "360l_application"
      runtime:
        description: "Runtime"
        required: true
        default: "java21"

env:
  REGION: us-east-1
  ROLE_NAME: lambda-execution-role
  JAVA_VERSION: '21'
  ARTIFACT_NAME: release-artifact
  ARTIFACT_PATH: target/lambda_jar_1.0.jar

jobs:
  ci:
    name: CI
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: maven

      - name: Validate and test
        run: mvn --batch-mode clean validate test

  build-artifact:
    name: Build Artifact
    runs-on: ubuntu-latest
    needs: ci

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: maven

      - name: Build fat JAR
        run: mvn --batch-mode package -DskipTests

      - name: Upload release artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ARTIFACT_NAME }}
          path: ${{ env.ARTIFACT_PATH }}
          if-no-files-found: error

  cd:
    name: CD
    runs-on: ubuntu-latest
    needs: build-artifact

    steps:
      - name: Download release artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ env.ARTIFACT_NAME }}
          path: target

      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.REGION }}

      - name: Ensure Lambda execution role exists
        id: role
        run: |
          if aws iam get-role --role-name "$ROLE_NAME" >/dev/null 2>&1; then
            echo "IAM role $ROLE_NAME already exists"
          else
            aws iam create-role \
              --role-name "$ROLE_NAME" \
              --assume-role-policy-document '{
                "Version": "2012-10-17",
                "Statement": [
                  {
                    "Effect": "Allow",
                    "Principal": {
                      "Service": "lambda.amazonaws.com"
                    },
                    "Action": "sts:AssumeRole"
                  }
                ]
              }'

            aws iam attach-role-policy \
              --role-name "$ROLE_NAME" \
              --policy-arn arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
          fi

          aws iam wait role-exists --role-name "$ROLE_NAME"
          ROLE_ARN=$(aws iam get-role --role-name "$ROLE_NAME" --query 'Role.Arn' --output text)
          echo "role_arn=$ROLE_ARN" >> "$GITHUB_OUTPUT"

      - name: Print role ARN
        run: echo "${{ steps.role.outputs.role_arn }}"

      - name: Check Lambda exists
        id: check
        run: |
          if aws lambda get-function --function-name "${{ github.event.inputs.function_name }}" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create Lambda
        if: steps.check.outputs.exists == 'false'
        run: |
          aws lambda create-function \
            --function-name "${{ github.event.inputs.function_name }}" \
            --runtime "${{ github.event.inputs.runtime }}" \
            --role "${{ steps.role.outputs.role_arn }}" \
            --handler org.example.LambdaHandler::handleRequest \
            --zip-file "fileb://${{ env.ARTIFACT_PATH }}"
      - name: Wait for Lambda to be active
        if: steps.check.outputs.exists == 'false'
        run: |
          aws lambda wait function-active \
            --function-name "${{ github.event.inputs.function_name }}"

      - name: Update Lambda code
        if: steps.check.outputs.exists == 'true'
        run: |
          aws lambda update-function-code \
            --function-name "${{ github.event.inputs.function_name }}" \
            --zip-file "fileb://${{ env.ARTIFACT_PATH }}"
      - name: Wait for Lambda to be active after update
        if: steps.check.outputs.exists == 'true'
        run: |
          aws lambda wait function-updated \
            --function-name "${{ github.event.inputs.function_name }}"
      - name: Publish version
        run: |
          VERSION=$(aws lambda publish-version \
            --function-name "${{ github.event.inputs.function_name }}" \
            --query 'Version' \
            --output text)
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"

      - name: Create or update alias
        run: |
          if aws lambda get-alias \
            --function-name "${{ github.event.inputs.function_name }}" \
            --name prod >/dev/null 2>&1; then
            aws lambda update-alias \
              --function-name "${{ github.event.inputs.function_name }}" \
              --name prod \
              --function-version "$VERSION"
          else
            aws lambda create-alias \
              --function-name "${{ github.event.inputs.function_name }}" \
              --name prod \
              --function-version "$VERSION"
          fi

      - name: Done
        run: |
          echo "Lambda deployment completed"
          echo "Function: ${{ github.event.inputs.function_name }}"
          echo "Version: $VERSION"
